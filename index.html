<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK 高中數學筆記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #ffffff; color: #1e293b; }
        .note-card { border: 1px solid #e2e8f0; transition: all 0.2s ease; }
        .note-card:hover { border-color: #94a3b8; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400 font-medium">載入筆記中...</div>
    </div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [tab, setTab] = useState('全部');
            const [selected, setSelected] = useState(null);

            const Icon = ({ n, s = 20, c = "" }) => {
                const Comp = window.lucide[n];
                return Comp ? <Comp size={s} className={c} /> : null;
            };

            const books = [
                { id: 1, title: '1. 數與式', type: '學測', topics: ['算幾不等式', '絕對值', '常用對數'] },
                { id: 2, title: '2. 多項式', type: '學測', topics: ['除法原理', '餘式定理', '三次函數'] },
                { id: 3, title: '3. 直線與圓', type: '學測', topics: ['斜率', '圓方程式', '切線公式'] },
                { id: 4, title: '4. 數列級數', type: '學測', topics: ['遞迴關係', '數學歸納法', '等比級數'] },
                { id: 5, title: '5. 數據分析', type: '學測', topics: ['相關係數', '迴歸直線', '標準差'] },
                { id: 6, title: '6. 排列組合機率', type: '學測', topics: ['二項式定理', '期望值', '古典機率'] },
                { id: 7, title: '7. 三角比', type: '學測', topics: ['正餘弦定理', '三角測量', '極坐標'] },
                { id: 8, title: '8. 三角函數', type: '學測', topics: ['弧度量', '疊合公式', '週期函數'] },
                { id: 9, title: '9. 指對數函數', type: '學測', topics: ['對數運算', '首尾數', '函數圖形'] },
                { id: 10, title: '10. 平面向量', type: '學測', topics: ['線性組合', '內積', '克拉瑪公式'] },
                { id: 11, title: '11. 空間向量', type: '學測', topics: ['三垂線定理', '外積', '空間行列式'] },
                { id: 12, title: '12. 空間平面直線', type: '學測', topics: ['法向量', '投影點', '距離公式'] },
                { id: 13, title: '13. 條件機率貝氏', type: '學測', topics: ['獨立事件', '貝氏定理', '條件機率'] },
                { id: 14, title: '14. 矩陣', type: '學測', topics: ['高斯消去', '線性變換', '轉移矩陣'] },
                { id: 15, title: '15. 極限', type: '分科', topics: ['夾擠定理', '無窮等比', '連續性'] },
                { id: 16, title: '16. 微分', type: '分科', topics: ['導函數', '連鎖律', '極值判別'] },
                { id: 17, title: '17. 積分', type: '分科', topics: ['黎曼和', '微積分基本定理', '面積'] },
                { id: 18, title: '18. 複數平面', type: '分科', topics: ['隸美弗', '複數極式', '單位根'] },
                { id: 19, title: '19. 二次曲線', type: '分科', topics: ['拋物線', '橢圓', '雙曲線'] },
                { id: 20, title: '20. 機率統計', type: '分科', topics: ['二項分佈', '常態分佈', '信心水準'] }
            ];

            const filtered = tab === '全部' ? books : books.filter(b => b.type === tab);

            return (
                <div className="max-w-6xl mx-auto px-6 py-12">
                    <header className="mb-16 border-b border-slate-100 pb-8 flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-serif font-bold text-slate-900 mb-2">BK 數學筆記目錄</h1>
                            <p className="text-slate-500 text-sm">高中數學數位學習典藏 (2026)</p>
                        </div>
                        <div className="flex gap-6 text-sm font-medium">
                            {['全部', '學測', '分科'].map(t => (
                                <button key={t} onClick={() => setTab(t)} 
                                    className={`${tab === t ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400 hover:text-slate-600'} pb-1 transition-all`}>
                                    {t}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex flex-col lg:flex-row gap-16">
                        <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {filtered.map(b => (
                                <div key={b.id} onClick={() => setSelected(b)}
                                    className={`note-card p-6 rounded-lg cursor-pointer flex justify-between items-center ${selected?.id === b.id ? 'bg-slate-50 border-slate-400' : 'bg-white'}`}>
                                    <div className="flex items-center gap-4">
                                        <span className="text-slate-300 font-mono text-sm">{b.id < 10 ? `0${b.id}` : b.id}</span>
                                        <span className="font-semibold text-slate-700">{b.title.split('. ')[1]}</span>
                                    </div>
                                    <span className="text-[10px] bg-slate-100 px-2 py-1 rounded text-slate-500 font-bold uppercase">{b.type}</span>
                                </div>
                            ))}
                        </div>

                        <aside className="lg:w-80">
                            {selected ? (
                                <div className="sticky top-12">
                                    <div className="mb-8">
                                        <h2 className="text-2xl font-bold text-slate-900 mb-4">{selected.title}</h2>
                                        <div className="space-y-4">
                                            {selected.topics.map((t, i) => (
                                                <div key={i} className="flex items-center gap-3 text-slate-600">
                                                    <div className="w-1 h-1 bg-blue-500 rounded-full"></div>
                                                    <span className="text-sm font-medium">{t}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button className="w-full bg-slate-900 text-white py-3 rounded font-medium hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                                        <Icon n="BookOpen" s={16} /> 閱讀詳細內容
                                    </button>
                                </div>
                            ) : (
                                <div className="h-48 border border-dashed border-slate-200 rounded-lg flex items-center justify-center text-slate-400 text-sm italic">
                                    請選取章節查看重點
                                </div>
                            )}
                        </aside>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        window.addEventListener('load', () => root.render(<App />));
    </script>
</body>
</html>
