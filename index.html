<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK 數學筆記管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #ffffff; color: #1e293b; }
        .note-card { border: 1px solid #e2e8f0; transition: all 0.2s ease; cursor: pointer; }
        .note-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .active-card { border-color: #3b82f6; bg-color: #f8fafc; ring: 2px; ring-color: #3b82f6; }
        iframe { width: 100%; height: 600px; border-radius: 8px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [selected, setSelected] = useState(null);
            const [uploadedFiles, setUploadedFiles] = useState({}); // 儲存每個 ID 對應的 PDF URL

            const Icon = ({ n, s = 20 }) => {
                const Comp = window.lucide[n];
                return Comp ? <Comp size={s} /> : null;
            };

            const books = [
                { id: 1, title: '1. 數與式', type: '學測' },
                { id: 2, title: '2. 多項式', type: '學測' },
                { id: 3, title: '3. 直線與圓', type: '學測' },
                { id: 4, title: '4. 數列級數', type: '學測' },
                { id: 5, title: '5. 數據分析', type: '學測' },
                { id: 15, title: '15. 極限', type: '分科' },
                { id: 16, title: '16. 微分', type: '分科' }
            ];

            // 處理檔案上傳
            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (file && file.type === "application/pdf") {
                    const fileURL = URL.createObjectURL(file);
                    setUploadedFiles(prev => ({
                        ...prev,
                        [selected.id]: fileURL
                    }));
                } else {
                    alert("請上傳 PDF 格式的檔案！");
                }
            };

            return (
                <div className="max-w-6xl mx-auto px-6 py-12">
                    <header className="mb-12 border-b pb-6">
                        <h1 className="text-3xl font-bold text-slate-900">BK 數學筆記管理系統</h1>
                        <p className="text-slate-500">點選章節後即可上傳並預覽 PDF</p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-12">
                        {/* 左側列表 */}
                        <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {books.map(b => (
                                <div key={b.id} onClick={() => setSelected(b)}
                                    className={`note-card p-5 rounded-xl flex justify-between items-center ${selected?.id === b.id ? 'border-blue-500 bg-blue-50' : 'bg-white'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2 h-2 rounded-full ${uploadedFiles[b.id] ? 'bg-green-500' : 'bg-slate-300'}`}></div>
                                        <span className="font-semibold">{b.title}</span>
                                    </div>
                                    {uploadedFiles[b.id] && <Icon n="FileCheck" className="text-green-600" />}
                                </div>
                            ))}
                        </div>

                        {/* 右側操作區 */}
                        <aside className="lg:w-[500px]">
                            {selected ? (
                                <div className="sticky top-8 space-y-6">
                                    <div className="bg-slate-50 p-6 rounded-2xl border">
                                        <h2 className="text-xl font-bold mb-4">{selected.title} - 管理內容</h2>
                                        
                                        {/* 上傳按鈕 */}
                                        <div className="mb-6">
                                            <label className="block w-full cursor-pointer bg-blue-600 text-white text-center py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                                                <input type="file" accept="application/pdf" className="hidden" onChange={handleFileUpload} />
                                                <div className="flex items-center justify-center gap-2">
                                                    <Icon n="UploadCloud" s={18} /> 上傳本章節 PDF
                                                </div>
                                            </label>
                                            <p className="text-[10px] text-slate-400 mt-2 text-center italic">註：上傳後僅供本次瀏覽，不會永久儲存在伺服器上</p>
                                        </div>

                                        {/* 預覽區域 */}
                                        {uploadedFiles[selected.id] ? (
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm font-bold text-green-600 flex items-center gap-1">
                                                        <Icon n="Eye" s={14} /> 檔案已就緒
                                                    </span>
                                                    <button onClick={() => window.open(uploadedFiles[selected.id])} className="text-blue-600 text-xs font-bold underline">全螢幕觀看</button>
                                                </div>
                                                <iframe src={uploadedFiles[selected.id]} title="PDF Preview"></iframe>
                                            </div>
                                        ) : (
                                            <div className="h-64 border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-400 bg-white">
                                                <Icon n="FileText" s={48} className="opacity-10 mb-2" />
                                                <p className="text-sm">尚未上傳筆記</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="h-64 border border-dashed rounded-2xl flex items-center justify-center text-slate-400 italic">
                                    請先從左側選擇一個章節
                                </div>
                            )}
                        </aside>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
