<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK 高中數學筆記大全</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e2e8f0; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-slate-400 font-bold animate-pulse">系統加載中...</p>
        </div>
    </div>

    <script>
        // 使用原生 JS 寫法，避免 Babel 轉換失敗導致白屏
        const e = React.createElement;
        const { useState, useMemo } = React;

        const App = () => {
            const [selectedBook, setSelectedBook] = useState(null);
            const [activeTab, setActiveTab] = useState('全部');
            const [showMockViewer, setShowMockViewer] = useState(false);

            const books = [
                { id: 1, title: '1. 數與式', examType: '學測', color: 'bg-blue-500', topics: ['算幾不等式', '絕對值', '常用對數'] },
                { id: 2, title: '2. 多項式', examType: '學測', color: 'bg-blue-600', topics: ['除法原理', '餘式定理', '三次函數'] },
                { id: 3, title: '3. 直線與圓', examType: '學測', color: 'bg-emerald-500', topics: ['斜率', '圓方程式', '切線公式'] },
                { id: 4, title: '4. 數列級數', examType: '學測', color: 'bg-amber-500', topics: ['遞迴關係', '數學歸納法', '等比級數'] },
                { id: 15, title: '15. 微積分', examType: '分科', color: 'bg-purple-600', topics: ['導函數', '積分定義', '黎曼和'] }
            ];

            const filteredBooks = useMemo(() => 
                activeTab === '全部' ? books : books.filter(b => b.examType === activeTab)
            , [activeTab]);

            return e('div', { className: 'min-h-screen flex flex-col' },
                // Header
                e('header', { className: 'bg-white border-b p-6 sticky top-0 z-10 shadow-sm' },
                    e('div', { className: 'max-w-7xl mx-auto flex justify-between items-center' },
                        e('h1', { className: 'text-2xl font-black text-slate-800' }, 'BK 高中數學筆記'),
                        e('div', { className: 'flex bg-slate-100 p-1 rounded-xl' },
                            ['全部', '學測', '分科'].map(tab => 
                                e('button', {
                                    key: tab,
                                    onClick: () => setActiveTab(tab),
                                    className: `px-4 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === tab ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`
                                }, tab)
                            )
                        )
                    )
                ),
                // Main Content
                e('main', { className: 'flex-1 max-w-7xl mx-auto w-full p-8 flex flex-col lg:flex-row gap-8' },
                    e('div', { className: 'flex-1 grid grid-cols-2 md:grid-cols-3 gap-6' },
                        filteredBooks.map(book => 
                            e('div', {
                                key: book.id,
                                onClick: () => setSelectedBook(book),
                                className: `cursor-pointer bg-white p-4 rounded-[2rem] shadow-md border-2 transition-all hover:-translate-y-1 ${selectedBook?.id === book.id ? 'border-indigo-500 shadow-xl' : 'border-transparent'}`
                            },
                                e('div', { className: `aspect-[3/4] rounded-2xl ${book.color} mb-4 p-4 text-white font-bold relative overflow-hidden` },
                                    e('span', { className: 'opacity-20 text-4xl' }, book.id),
                                    e('div', { className: 'absolute bottom-4 left-4 text-lg' }, book.title.split('. ')[1])
                                ),
                                e('div', { className: 'text-[10px] font-black text-slate-400 uppercase' }, `${book.examType} UNIT ${book.id}`)
                            )
                        )
                    ),
                    // Sidebar
                    e('aside', { className: 'w-full lg:w-80' },
                        selectedBook ? e('div', { className: 'bg-white p-8 rounded-[2.5rem] shadow-xl sticky top-32 border border-slate-100 animate-fade-in' },
                            e('h2', { className: 'text-2xl font-black mb-4' }, selectedBook.title),
                            e('div', { className: 'space-y-3 mb-8' },
                                selectedBook.topics.map((t, i) => e('div', { key: i, className: 'text-sm font-bold text-slate-600 flex items-center gap-2' }, 
                                    e('span', { className: 'w-5 h-5 bg-indigo-50 text-indigo-500 rounded flex items-center justify-center text-[10px]' }, i+1), t
                                ))
                            ),
                            e('button', {
                                onClick: () => setShowMockViewer(true),
                                className: 'w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-700 active:scale-95 transition-all'
                            }, '閱覽內容')
                        ) : e('div', { className: 'h-64 border-2 border-dashed border-slate-200 rounded-[2.5rem] flex items-center justify-center text-slate-300 font-bold' }, '選一個章節吧！')
                    )
                ),
                // Mock Viewer
                showMockViewer && e('div', { className: 'fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-md flex items-center justify-center p-4' },
                    e('div', { className: 'bg-white w-full max-w-4xl h-[80vh] rounded-[2rem] overflow-hidden flex flex-col shadow-2xl animate-fade-in' },
                        e('div', { className: 'p-6 border-b flex justify-between items-center' },
                            e('span', { className: 'font-black' }, `${selectedBook?.title}.pdf`),
                            e('button', { onClick: () => setShowMockViewer(false), className: 'px-4 py-2 bg-slate-100 rounded-lg font-bold' }, '關閉')
                        ),
                        e('div', { className: 'flex-1 bg-slate-50 p-12 overflow-auto' },
                            e('div', { className: 'bg-white p-20 shadow-sm min-h-full rounded-lg' },
                                e('h1', { className: 'text-4xl font-black mb-8' }, selectedBook?.title),
                                e('div', { className: 'space-y-6' }, 
                                    e('p', { className: 'text-slate-400' }, '這裡是筆記的內容預覽...'),
                                    e('div', { className: 'h-4 w-full bg-slate-100 rounded' }),
                                    e('div', { className: 'h-4 w-2/3 bg-slate-100 rounded' })
                                )
                            )
                        )
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
