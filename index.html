<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK 高中數學筆記大全</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-slate-400 font-bold">
            系統啟動中...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            // 從全域 window.lucide 安全取得圖標
            const icons = window.lucide || {};
            const { 
                BookOpen, Clock, CheckCircle2, AlertCircle, Loader2, 
                MousePointer2, FileText, FileUp, Plus, X, Share2, 
                Server, Globe, GraduationCap 
            } = icons;

            const [selectedBook, setSelectedBook] = useState(null);
            const [activeTab, setActiveTab] = useState('全部');
            const [isOpening, setIsOpening] = useState(false);
            const [showMockViewer, setShowMockViewer] = useState(false);
            const [isUploading, setIsUploading] = useState(false);
            const [fileStatus, setFileStatus] = useState({
                1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 
                8: true, 9: true, 10: true, 11: true, 12: true, 13: true, 14: true
            });

            const books = [
                { id: 1, title: '1. 數與式', examType: '學測', color: 'bg-blue-500', topics: ['算幾不等式', '絕對值', '常用對數'] },
                { id: 2, title: '2. 多項式', examType: '學測', color: 'bg-blue-600', topics: ['除法原理', '餘式定理', '三次函數'] },
                { id: 3, title: '3. 直線與圓', examType: '學測', color: 'bg-emerald-500', topics: ['斜率', '圓方程式', '切線公式'] },
                { id: 4, title: '4. 數列級數', examType: '學測', color: 'bg-amber-500', topics: ['遞迴關係', '數學歸納法', '等比級數'] },
                { id: 5, title: '5. 數據分析', examType: '學測', color: 'bg-rose-500', topics: ['相關係數', '迴歸直線', '標準差'] },
                { id: 6, title: '6. 排列組合機率', examType: '學測', color: 'bg-amber-600', topics: ['二項式定理', '期望值', '古典機率'] },
                { id: 7, title: '7. 三角比', examType: '學測', color: 'bg-emerald-600', topics: ['正餘弦定理', '三角測量', '極坐標'] },
                { id: 8, title: '8. 三角函數', examType: '學測', color: 'bg-emerald-700', topics: ['弧度量', '疊合公式', '週期函數'] },
                { id: 9, title: '9. 指對數函數', examType: '學測', color: 'bg-blue-700', topics: ['對數運算', '首尾數', '函數圖形'] },
                { id: 10, title: '10. 平面向量', examType: '學測', color: 'bg-emerald-800', topics: ['線性組合', '內積', '克拉瑪公式'] },
                { id: 11, title: '11. 空間向量', examType: '學測', color: 'bg-indigo-500', topics: ['三垂線定理', '外積', '空間行列式'] },
                { id: 12, title: '12. 空間平面直線', examType: '學測', color: 'bg-indigo-600', topics: ['法向量', '投影點', '距離公式'] },
                { id: 13, title: '13. 條件機率貝氏', examType: '學測', color: 'bg-amber-700', topics: ['獨立事件', '貝氏定理', '條件機率'] },
                { id: 14, title: '14. 矩陣', examType: '學測', color: 'bg-indigo-700', topics: ['高斯消去', '線性變換', '轉移矩陣'] },
                { id: 15, title: '15. 數列函數極限', examType: '分科', color: 'bg-purple-500', topics: ['夾擠定理', '無窮等比級數', '函數連續性'] },
                { id: 16, title: '16. 微分', examType: '分科', color: 'bg-purple-600', topics: ['導函數定義', '連鎖律', '切線與極值判別'] },
                { id: 17, title: '17. 積分', examType: '分科', color: 'bg-purple-700', topics: ['黎曼和', '微積分基本定理', '反導函數'] },
                { id: 18, title: '18. 多項式方程複數', examType: '分科', color: 'bg-blue-800', topics: ['隸美弗定理', '複數平面', '代數基本定理'] },
                { id: 19, title: '19. 二次曲線', examType: '分科', color: 'bg-orange-600', topics: ['拋物線', '橢圓', '雙曲線標準式'] },
                { id: 20, title: '20. 機率統計II', examType: '分科', color: 'bg-rose-700', topics: ['白努利試驗', '二項分佈', '常態分佈'] }
            ];

            const filteredBooks = useMemo(() => {
                if (activeTab === '學測') return books.filter(b => b.examType === '學測');
                if (activeTab === '分科') return books.filter(b => b.examType === '分科');
                return books;
            }, [activeTab]);

            const handleFileUpload = () => {
                if (!selectedBook) return;
                setIsUploading(true);
                setTimeout(() => {
                    setFileStatus(prev => ({ ...prev, [selectedBook.id]: true }));
                    setIsUploading(false);
                }, 1500);
            };

            // 如果圖標還沒載入，回傳簡易訊息
            if (!BookOpen) return <div className="p-20 text-center">正在下載圖標組件...</div>;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans selection:bg-indigo-100">
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-6 sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-gradient-to-br from-indigo-600 to-violet-700 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                    <BookOpen size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">BK 高中數學筆記大全</h1>
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Complete Study Notes</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                                {['全部', '學測', '分科'].map((tab) => (
                                    <button key={tab} onClick={() => setActiveTab(tab)}
                                        className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === tab ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-6 md:p-8 flex flex-col lg:flex-row gap-10">
                        <div className="flex-1">
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-6">
                                {filteredBooks.map((book) => (
                                    <div key={book.id} onClick={() => setSelectedBook(book)}
                                        className={`group relative cursor-pointer bg-white rounded-[2rem] p-4 transition-all duration-300 hover:shadow-2xl border-2 ${selectedBook?.id === book.id ? 'border-indigo-500 shadow-xl -translate-y-2' : 'border-transparent shadow-md'}`}>
                                        <div className={`aspect-[3/4] rounded-2xl mb-4 ${book.color} flex flex-col justify-between p-5 text-white relative overflow-hidden`}>
                                            <div className="text-5xl font-black opacity-20 italic">{book.id < 10 ? `0${book.id}` : book.id}</div>
                                            <div className="font-bold text-lg leading-tight z-10">{book.title.split('. ')[1]}</div>
                                        </div>
                                        <div className="flex justify-between items-center px-1">
                                            <span className="text-[10px] font-black uppercase text-slate-400">{book.examType} UNIT {book.id}</span>
                                            {fileStatus[book.id] ? <CheckCircle2 size={16} className="text-emerald-500" /> : <AlertCircle size={16} className="text-slate-300" />}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <aside className="w-full lg:w-96 shrink-0">
                            {selectedBook ? (
                                <div className="bg-white rounded-[3rem] shadow-2xl p-8 sticky top-32 border border-slate-100">
                                    <h2 className="text-3xl font-black text-slate-800 mb-6 tracking-tighter">{selectedBook.title}</h2>
                                    <div className="bg-indigo-50/50 rounded-3xl p-6 mb-8">
                                        <p className="text-[10px] font-black text-indigo-400 mb-4 tracking-widest uppercase flex items-center gap-2"><Clock size={14}/> 章節焦點</p>
                                        <div className="space-y-3">
                                            {selectedBook.topics.map((t, i) => (
                                                <div key={i} className="flex items-center gap-3 text-sm font-bold text-slate-600">
                                                    <div className="w-5 h-5 rounded-md bg-white flex items-center justify-center text-[10px] text-indigo-500 shadow-sm">{i+1}</div>
                                                    <span>{t}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <button onClick={() => { setIsOpening(true); setTimeout(() => { setIsOpening(false); setShowMockViewer(true); }, 800); }}
                                            className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-indigo-700 shadow-lg transition-all">
                                            {isOpening ? <Loader2 className="animate-spin"/> : <MousePointer2 size={18}/>} 閱覽筆記內容
                                        </button>
                                        <button onClick={handleFileUpload} disabled={isUploading}
                                            className="w-full border-2 border-slate-100 font-black py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-slate-50 transition-all text-slate-600">
                                            {isUploading ? <Loader2 className="animate-spin text-indigo-500"/> : <FileUp size={18}/>} 上傳本地 PDF
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full min-h-[400px] border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 text-center p-10">
                                    <Plus size={48} className="mb-4 opacity-50" />
                                    <p className="font-black uppercase tracking-widest text-sm">請選擇章節開始</p>
                                </div>
                            )}
                        </aside>
                    </main>

                    {showMockViewer && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-5xl h-[90vh] rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl animate-in fade-in zoom-in duration-300">
                                <div className="px-8 py-5 border-b flex justify-between items-center bg-white">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-600 p-2 rounded-xl text-white"><FileText size={20}/></div>
                                        <h4 className="font-black text-slate-800">{selectedBook?.title}.pdf</h4>
                                    </div>
                                    <button onClick={() => setShowMockViewer(false)} className="p-2 hover:bg-slate-100 rounded-full transition-all"><X size={24}/></button>
                                </div>
                                <div className="flex-1 bg-slate-100 p-8 overflow-auto flex justify-center custom-scrollbar">
                                    <div className="bg-white w-full max-w-3xl shadow-xl p-16 min-h-[1000px] rounded-sm border border-slate-200">
                                        <h1 className="text-5xl font-black text-slate-900 mb-10">{selectedBook?.title}</h1>
                                        <div className="h-4 w-1/3 bg-indigo-500 mb-20 rounded-full opacity-20"></div>
                                        <div className="space-y-12">
                                            <div className="p-8 bg-slate-50 rounded-3xl border border-slate-100">
                                                <h3 className="text-indigo-600 font-black text-xs tracking-widest uppercase mb-6 flex items-center gap-2"><Globe size={16}/> 雲端同步預覽</h3>
                                                <div className="grid gap-6">
                                                    {selectedBook?.topics.map((t, i) => (
                                                        <div key={i} className="flex flex-col gap-2">
                                                            <div className="text-slate-800 font-bold">重點 {i+1}: {t}</div>
                                                            <div className="h-1 bg-slate-200 rounded-full w-full"></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="py-20 flex flex-col items-center justify-center border-2 border-dashed border-slate-100 rounded-[2rem]">
                                                <div className="animate-spin-slow text-slate-200 mb-4"><Plus size={40} /></div>
                                                <p className="text-slate-400 font-bold text-sm">正在等待 PDF 串流...</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t border-slate-200 py-8 px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-slate-400 font-black text-[10px] tracking-widest uppercase">
                            <span className="flex items-center gap-2 text-indigo-500"><Server size={14}/> Cloud Connected</span>
                            <span>BK Math 2026 Version</span>
                            <button className="px-6 py-2 bg-slate-900 text-white rounded-xl flex items-center gap-2 hover:bg-black transition-all">
                                <Share2 size={14}/> 分享檔案
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        // 確保在 DOM 完全加載後進行 React 掛載
        const startApp = () => {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        };

        if (document.readyState === 'complete') {
            startApp();
        } else {
            window.addEventListener('load', startApp);
        }
    </script>
</body>
</html>
</body>
</html>
