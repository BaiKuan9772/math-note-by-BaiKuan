<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK 高中數學筆記大全</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 從全域變數中解構 React Hooks
        const { useState, useMemo, useEffect } = React;
        
        // 取得 Lucide 圖標元件
        const { 
            FolderOpen, MousePointer2, GraduationCap, 
            School, FileText, X, Loader2, Upload, Plus, CheckCircle2,
            FileUp, BookOpen, Clock, AlertCircle, Share2, Globe, Server 
        } = lucide;

        const App = () => {
            const [selectedBook, setSelectedBook] = useState(null);
            const [activeTab, setActiveTab] = useState('全部');
            const [isOpening, setIsOpening] = useState(false);
            const [showMockViewer, setShowMockViewer] = useState(false);
            const [fileStatus, setFileStatus] = useState({
                1: true, 2: true, 3: true, 4: true, 5: true, 6: true, 7: true, 
                8: true, 9: true, 10: true, 11: true, 12: true, 13: true, 14: true
            });
            const [isUploading, setIsUploading] = useState(false);

            const handleFileUpload = () => {
                if (!selectedBook) return;
                setIsUploading(true);
                setTimeout(() => {
                    setFileStatus(prev => ({ ...prev, [selectedBook.id]: true }));
                    setIsUploading(false);
                }, 2000);
            };

            const books = [
                { id: 1, title: '1. 數與式', examType: '學測', color: 'bg-blue-500', topics: ['算幾不等式', '絕對值', '常用對數'], pageCount: 17 },
                { id: 2, title: '2. 多項式', examType: '學測', color: 'bg-blue-600', topics: ['除法原理', '餘式定理', '三次函數'], pageCount: 19 },
                { id: 3, title: '3. 直線與圓', examType: '學測', color: 'bg-emerald-500', topics: ['斜率', '圓方程式', '切線公式'], pageCount: 28 },
                { id: 4, title: '4. 數列級數', examType: '學測', color: 'bg-amber-500', topics: ['遞迴關係', '數學歸納法', '等比級數'], pageCount: 9 },
                { id: 5, title: '5. 數據分析', examType: '學測', color: 'bg-rose-500', topics: ['相關係數', '迴歸直線', '標準差'], pageCount: 15 },
                { id: 6, title: '6. 排列組合機率', examType: '學測', color: 'bg-amber-600', topics: ['二項式定理', '期望值', '古典機率'], pageCount: 18 },
                { id: 7, title: '7. 三角比', examType: '學測', color: 'bg-emerald-600', topics: ['正餘弦定理', '三角測量', '極坐標'], pageCount: 27 },
                { id: 8, title: '8. 三角函數', examType: '學測', color: 'bg-emerald-700', topics: ['弧度量', '疊合公式', '週期函數'], pageCount: 14 },
                { id: 9, title: '9. 指對數函數', examType: '學測', color: 'bg-blue-700', topics: ['對數運算', '首尾數', '函數圖形'], pageCount: 10 },
                { id: 10, title: '10. 平面向量', examType: '學測', color: 'bg-emerald-800', topics: ['線性組合', '內積', '克拉瑪公式'], pageCount: 34 },
                { id: 11, title: '11. 空間向量', examType: '學測', color: 'bg-indigo-500', topics: ['三垂線定理', '外積', '空間行列式'], pageCount: 21 },
                { id: 12, title: '12. 空間平面直線', examType: '學測', color: 'bg-indigo-600', topics: ['法向量', '投影點', '距離公式'], pageCount: 14 },
                { id: 13, title: '13. 條件機率貝氏', examType: '學測', color: 'bg-amber-700', topics: ['獨立事件', '貝氏定理', '條件機率'], pageCount: 8 },
                { id: 14, title: '14. 矩陣', examType: '學測', color: 'bg-indigo-700', topics: ['高斯消去', '線性變換', '轉移矩陣'], pageCount: 33 },
                { id: 15, title: '15. 數列函數極限', examType: '分科', color: 'bg-purple-500', topics: ['夾擠定理', '無窮等比級數', '函數連續性'], pageCount: 0 },
                { id: 16, title: '16. 微分', examType: '分科', color: 'bg-purple-600', topics: ['導函數定義', '連鎖律', '切線與極值判別'], pageCount: 0 },
                { id: 17, title: '17. 積分', examType: '分科', color: 'bg-purple-700', topics: ['黎曼和', '微積分基本定理', '反導函數'], pageCount: 0 },
                { id: 18, title: '18. 多項式方程複數', examType: '分科', color: 'bg-blue-800', topics: ['隸美弗定理', '複數平面', '代數基本定理'], pageCount: 0 },
                { id: 19, title: '19. 二次曲線', examType: '分科', color: 'bg-orange-600', topics: ['拋物線', '橢圓', '雙曲線標準式'], pageCount: 0 },
                { id: 20, title: '20. 機率統計II', examType: '分科', color: 'bg-rose-700', topics: ['白努利試驗', '二項分佈', '常態分佈'], pageCount: 0 }
            ];

            const filteredBooks = useMemo(() => {
                if (activeTab === '學測') return books.filter(b => b.examType === '學測');
                if (activeTab === '分科') return books.filter(b => b.examType === '分科');
                return books;
            }, [activeTab]);

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans selection:bg-indigo-100">
                    <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 py-6 sticky top-0 z-30">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-gradient-to-br from-indigo-600 to-violet-700 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                    <BookOpen size={28} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">BK 高中數學筆記大全</h1>
                                    <p className="text-xs text-slate-500 font-bold tracking-widest uppercase">High School Math Complete Notes</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                                {['全部', '學測', '分科'].map((tab) => (
                                    <button key={tab} onClick={() => setActiveTab(tab)}
                                        className={`px-6 py-2 rounded-xl text-sm font-bold transition-all ${activeTab === tab ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-6 md:p-8 flex flex-col lg:flex-row gap-10">
                        <div className="flex-1">
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-6">
                                {filteredBooks.map((book) => (
                                    <div key={book.id} onClick={() => setSelectedBook(book)}
                                        className={`group relative cursor-pointer bg-white rounded-[2rem] p-4 transition-all duration-500 hover:shadow-2xl border-2 ${selectedBook?.id === book.id ? 'border-indigo-500 shadow-xl -translate-y-2' : 'border-transparent shadow-md'}`}>
                                        
                                        <div className={`aspect-[3/4] rounded-2xl mb-4 ${book.color} flex flex-col justify-between p-5 text-white relative overflow-hidden shadow-inner`}>
                                            <div className="absolute -top-4 -right-4 p-4 opacity-10 rotate-12 transition-transform group-hover:scale-110 group-hover:rotate-0"><GraduationCap size={100} /></div>
                                            <div className="text-5xl font-black opacity-20 italic">{book.id < 10 ? `0${book.id}` : book.id}</div>
                                            <div className="font-bold text-lg leading-tight drop-shadow-md z-10">{book.title.split('. ')[1]}</div>
                                        </div>

                                        <div className="flex justify-between items-center px-1">
                                            <div className="flex flex-col">
                                                <span className={`text-[10px] font-black uppercase tracking-widest ${book.examType === '學測' ? 'text-blue-500' : 'text-purple-500'}`}>{book.examType}</span>
                                                <span className="text-xs font-black text-slate-400">UNIT {book.id}</span>
                                            </div>
                                            {fileStatus[book.id] ? (
                                                <div className="bg-emerald-100 text-emerald-600 p-1.5 rounded-full"><CheckCircle2 size={16} /></div>
                                            ) : (
                                                <div className="bg-slate-100 text-slate-300 p-1.5 rounded-full"><AlertCircle size={16} /></div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <aside className="w-full lg:w-96 shrink-0">
                            {selectedBook ? (
                                <div className="bg-white rounded-[3rem] shadow-2xl p-8 sticky top-32 border border-slate-100 flex flex-col h-fit transition-all">
                                    <div className="flex items-center gap-3 mb-6">
                                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${selectedBook.examType === '學測' ? 'bg-blue-100 text-blue-600' : 'bg-purple-100 text-purple-600'}`}>
                                            {selectedBook.examType} 範圍
                                        </span>
                                    </div>

                                    <h2 className="text-4xl font-black text-slate-800 mb-6 leading-[1.1] tracking-tighter">{selectedBook.title}</h2>
                                    
                                    <div className="bg-indigo-50/50 rounded-3xl p-6 mb-8 border border-indigo-100/50">
                                        <p className="text-[10px] font-black text-indigo-400 mb-4 flex items-center gap-2 tracking-[0.2em] uppercase"><Clock size={14}/> 核心章節概念</p>
                                        <div className="space-y-4">
                                            {selectedBook.topics.map((t, i) => (
                                                <div key={i} className="flex items-start gap-3 text-sm font-bold text-slate-600">
                                                    <div className="w-5 h-5 rounded-lg bg-white flex items-center justify-center text-[10px] text-indigo-500 shadow-sm shrink-0">{i+1}</div>
                                                    <span>{t}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-4 mt-auto">
                                        {fileStatus[selectedBook.id] ? (
                                            <button 
                                                onClick={() => { setIsOpening(true); setTimeout(() => { setIsOpening(false); setShowMockViewer(true); }, 800); }}
                                                className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-3 hover:bg-indigo-700 hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-indigo-100">
                                                {isOpening ? <Loader2 className="animate-spin"/> : <MousePointer2 size={20}/>}
                                                閱覽筆記內容
                                            </button>
                                        ) : (
                                            <button disabled className="w-full bg-slate-100 text-slate-400 font-bold py-5 rounded-[1.5rem] flex items-center justify-center gap-3 cursor-not-allowed">
                                                <FileText size={20}/> 尚無雲端檔案
                                            </button>
                                        )}
                                        
                                        <button 
                                            onClick={handleFileUpload}
                                            disabled={isUploading}
                                            className="w-full bg-white text-slate-600 border-2 border-slate-100 font-black py-5 rounded-[1.5rem] flex items-center justify-center gap-3 hover:bg-slate-50 hover:border-slate-200 transition-all active:scale-95">
                                            {isUploading ? <Loader2 className="animate-spin text-indigo-500"/> : <FileUp size={20}/>}
                                            {isUploading ? '雲端同步中...' : '上傳本地 PDF'}
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full min-h-[500px] border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-400 p-12 text-center group">
                                    <div className="bg-slate-100 p-8 rounded-full mb-8 text-slate-300 group-hover:scale-110 group-hover:text-indigo-300 transition-all duration-500">
                                        <Plus size={64} strokeWidth={3} />
                                    </div>
                                    <h3 className="text-xl font-black text-slate-600">啟動你的學習旅程</h3>
                                    <p className="text-sm font-medium mt-3 max-w-[200px] leading-relaxed text-slate-400 uppercase tracking-widest">Select a chapter to start managing your notes</p>
                                </div>
                            )}
                        </aside>
                    </main>

                    {/* 模擬 PDF 預覽介面 */}
                    {showMockViewer && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-slate-900/40 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-6xl h-full rounded-[3rem] overflow-hidden flex flex-col shadow-2xl">
                                <div className="px-8 py-6 border-b flex justify-between items-center bg-white/50 backdrop-blur-md">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-100 text-white"><FileText size={24}/></div>
                                        <div>
                                            <h4 className="font-black text-slate-800 tracking-tight">{selectedBook?.title}.pdf</h4>
                                            <div className="flex items-center gap-2 mt-0.5">
                                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" />
                                                <p className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Live Cloud Synchronization</p>
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowMockViewer(false)} className="p-4 bg-slate-100 hover:bg-red-50 hover:text-red-500 rounded-full transition-all active:scale-90"><X size={24}/></button>
                                </div>
                                
                                <div className="flex-1 bg-slate-50 p-4 md:p-12 overflow-auto flex justify-center custom-scrollbar">
                                    <div className="bg-white w-full max-w-4xl shadow-2xl p-12 md:p-24 rounded-sm min-h-[1200px] border border-slate-100 flex flex-col">
                                        <div className="flex justify-between items-start mb-20">
                                            <div>
                                                <p className="text-indigo-600 font-black text-sm tracking-[0.4em] uppercase mb-4">Official Study Guide</p>
                                                <h1 className="text-6xl font-black text-slate-900 leading-none tracking-tighter">
                                                    {selectedBook?.title.split('. ')[1]}
                                                </h1>
                                            </div>
                                            <span className="text-slate-200 font-black text-6xl tracking-tighter italic opacity-50">#{selectedBook?.id < 10 ? `0${selectedBook?.id}` : selectedBook?.id}</span>
                                        </div>
                                        
                                        <div className="space-y-12 flex-1">
                                            <div className="p-10 bg-slate-50 rounded-[2.5rem] border border-slate-100 relative overflow-hidden group">
                                                <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 -mr-16 -mt-16 rounded-full" />
                                                <h3 className="text-indigo-600 font-black text-sm tracking-widest uppercase mb-8 flex items-center gap-2">
                                                    <Clock size={16} /> 內容結構預覽
                                                </h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                                    {selectedBook?.topics.map((t, i) => (
                                                        <div key={i} className="flex flex-col gap-2">
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-indigo-300 font-black italic">0{i+1}</span>
                                                                <span className="text-slate-800 font-black text-lg">{t}</span>
                                                            </div>
                                                            <div className="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                                                                <div className="h-full bg-indigo-500 rounded-full w-2/3 opacity-30" />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div className="flex-1 flex flex-col items-center justify-center py-20">
                                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center text-slate-200 mb-6 border-4 border-dashed border-slate-100 animate-spin-slow">
                                                     <Globe size={40} />
                                                </div>
                                                <p className="text-slate-400 font-black uppercase tracking-[0.3em] text-xs">Awaiting local PDF scan...</p>
                                                <p className="text-slate-300 text-[10px] mt-2 font-bold max-w-xs text-center leading-relaxed">你的個人筆記將會在這裡以高畫質呈現，目前為模擬介面。</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-20 pt-10 border-t border-slate-100 flex justify-between items-center text-slate-300 font-black text-[10px] tracking-widest uppercase">
                                            <span>BK High School Mathematics Library</span>
                                            <span>Copyright © 2026</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t border-slate-200 py-10 px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-6 text-slate-400 font-black text-[10px] tracking-widest uppercase">
                                <span className="flex items-center gap-2 text-indigo-500"><Server size={14}/> Cloud Connected</span>
                                <span>20 Chapters Total</span>
                                <span>Math Curriculum 108</span>
                            </div>
                            <div className="flex gap-4">
                                <button className="px-6 py-2 bg-slate-900 text-white rounded-xl text-xs font-black uppercase tracking-widest hover:bg-black transition-all flex items-center gap-2">
                                    <Share2 size={14}/> 分享筆記
                                </button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
